<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opening Maps...</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background: #f5f5f7;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
  }
  .box { max-width: 320px; }
  a {
    display: inline-block;
    margin-top: 16px;
    padding: 12px 20px;
    background: #007aff;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="box">
  <p>Opening Maps…</p>
  <p id="fallback" style="display:none;">
    If nothing happened, tap below:<br>
    <a id="fallback-link" href="#">Open Maps</a>
  </p>
</div>

<script>
  // ---- Destination coordinates ----
  var lat = "34.2084622";
  var lng = "74.34154";
  // ----------------------------------

  // Native app schemes (open the app directly, no browser prompt)
  var appleMapsNative = "maps://?ll=" + lat + "," + lng + "&q=Pinned+Location";
  var googleMapsNative = "geo:" + lat + "," + lng + "?q=" + lat + "," + lng + "(Pinned+Location)";

  // Web fallbacks (used only if the native scheme fails, e.g. desktop)
  var appleMapsWeb = "https://maps.apple.com/?ll=" + lat + "," + lng + "&q=Pinned+Location";
  var googleMapsWeb = "https://www.google.com/maps/search/?api=1&query=" + lat + "," + lng;

  var ua = navigator.userAgent || navigator.vendor || window.opera;
  var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  var isAndroid = /android/i.test(ua);

  var nativeUrl, webUrl;
  if (isIOS) {
    nativeUrl = appleMapsNative;
    webUrl = appleMapsWeb;
  } else if (isAndroid) {
    nativeUrl = googleMapsNative;
    webUrl = googleMapsWeb;
  } else {
    // Desktop or unknown device — go straight to web version
    nativeUrl = googleMapsWeb;
    webUrl = googleMapsWeb;
  }

  document.getElementById("fallback-link").href = webUrl;

  // Fire the native app scheme immediately on page load
  window.location.href = nativeUrl;

  // If the native scheme didn't launch an app (page still visible after a moment),
  // fall back to the web version automatically.
  setTimeout(function () {
    document.getElementById("fallback").style.display = "block";
    if (!document.hidden) {
      window.location.href = webUrl;
    }
  }, 1200);
</script>
</body>
</html>
