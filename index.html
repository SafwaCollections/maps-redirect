<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Opening Maps...</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
    background: #f5f5f7;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
  }
  .box { max-width: 320px; }
  a {
    display: inline-block;
    margin-top: 16px;
    padding: 12px 20px;
    background: #007aff;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="box">
  <p>Opening Maps…</p>
  <p id="fallback" style="display:none;">
    If nothing happened, tap below:<br>
    <a id="fallback-link" href="#">Open Maps</a>
  </p>
</div>

<script>
  // ---- Destination coordinates ----
  var lat = "34.2084877";
  var lng = "74.3414951";
  // ----------------------------------

  var appleMapsUrl = "https://maps.apple.com/?ll=" + lat + "," + lng + "&q=Pinned+Location";
  var googleMapsUrl = "https://www.google.com/maps/search/?api=1&query=" + lat + "," + lng;

  var ua = navigator.userAgent || navigator.vendor || window.opera;
  var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  var isAndroid = /android/i.test(ua);

  var targetUrl;
  if (isIOS) {
    targetUrl = appleMapsUrl;
  } else if (isAndroid) {
    targetUrl = googleMapsUrl;
  } else {
    // Desktop or unknown device — default to Google Maps
    targetUrl = googleMapsUrl;
  }

  document.getElementById("fallback-link").href = targetUrl;
  window.location.href = targetUrl;

  // Show fallback link in case auto-redirect is blocked
  setTimeout(function () {
    document.getElementById("fallback").style.display = "block";
  }, 1000);
</script>
</body>
</html>
